<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Stylized Aleph (א) symbol — two yods connected by a diagonal vav -->
  <g transform="translate(6, 5)">
    <!-- Upper-right yod -->
    <circle cx="28" cy="4" r="3.5" fill="#2563eb"/>
    <!-- Diagonal vav (connecting stroke) -->
    <line x1="26" y1="7" x2="10" y2="33" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Lower-left yod -->
    <circle cx="8" cy="36" r="3.5" fill="#2563eb"/>
    <!-- Upper-left arm -->
    <path d="M24 8 Q16 6 6 10" stroke="#2563eb" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Lower-right arm -->
    <path d="M12 32 Q20 34 30 30" stroke="#2563eb" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Text -->
  <text x="52" y="34" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="28" letter-spacing="3" fill="#1e293b">ALEPH</text>
</svg>

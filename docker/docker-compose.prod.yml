services:
  platform:
    container_name: chs-platform
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://chs:${POSTGRES_PASSWORD}@chs-db:5432/chs
      - JWT_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - ORG_NAME=${ORG_NAME}
      - ORG_SLUG=${ORG_SLUG}
      - ORG_DOMAIN=${ORG_DOMAIN}
      - NODE_ENV=production
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_MODEL=${AI_MODEL:-gemini-3-flash-preview}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-4096}
      - AI_RATE_LIMIT_MESSAGES_PER_HOUR=${AI_RATE_LIMIT_MESSAGES_PER_HOUR:-50}
      - AI_RATE_LIMIT_TOKENS_PER_DAY=${AI_RATE_LIMIT_TOKENS_PER_DAY:-100000}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      chs-db:
        condition: service_healthy
    networks:
      - coolify
      - chs-internal
    restart: unless-stopped

  chs-db:
    container_name: chs-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chs
      - POSTGRES_USER=chs
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - chs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chs"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chs-internal
    restart: unless-stopped

networks:
  coolify:
    external: true
  chs-internal:
    driver: bridge

volumes:
  chs-pgdata:
